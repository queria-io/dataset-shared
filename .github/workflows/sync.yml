name: Sync (reusable)

on:
  workflow_call:
    inputs:
      dataset_name:
        required: true
        type: string
      s3_bucket:
        required: true
        type: string

jobs:
  sync:
    runs-on: ubuntu-latest
    env:
      PYTHONUNBUFFERED: "1"
      FDL_S3_ENDPOINT: https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com
      FDL_S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      FDL_S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      FDL_S3_BUCKET: ${{ inputs.s3_bucket }}
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
      CF_API_TOKEN: ${{ secrets.CF_API_TOKEN }}
      CF_D1_DATABASE_ID: ${{ secrets.CF_D1_DATABASE_ID }}
      ESTAT_API_KEY: ${{ secrets.ESTAT_API_KEY }}
      REINFOLIB_API_KEY: ${{ secrets.REINFOLIB_API_KEY }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.13

      # fdl (frozen-ducklake) はベータ開発中のため、常に最新版を使用する
      - run: uv lock --upgrade-package frozen-ducklake && uv sync

      - name: Build and push
        run: scripts/build.sh default

      - name: Generate app token
        id: app-token
        if: success()
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ secrets.APP_ID }}
          private-key: ${{ secrets.APP_PRIVATE_KEY }}
          owner: flo8s
          repositories: dataset-catalog

      - name: Trigger catalog rebuild
        if: success()
        run: |
          gh api repos/flo8s/dataset-catalog/dispatches \
            -f event_type=dataset-updated \
            -f "client_payload[dataset]=${{ inputs.dataset_name }}"
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}

  notify-failure:
    runs-on: ubuntu-latest
    needs: sync
    if: failure()
    steps:
      - name: Notify Discord on failure
        run: |
          curl -s -H "Content-Type: application/json" \
            -d "{\"embeds\": [{\"title\": \"Sync Failed\", \"url\": \"${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}\", \"color\": 15158332, \"fields\": [{\"name\": \"Repository\", \"value\": \"${{ github.repository }}\"}, {\"name\": \"Branch\", \"value\": \"${{ github.ref_name }}\"}, {\"name\": \"Commit\", \"value\": \"${{ github.sha }}\"}]}]}" \
            "${{ secrets.DISCORD_WEBHOOK_URL }}"
