name: Checkpoint (reusable)

on:
  workflow_call:
    inputs:
      s3_bucket:
        required: true
        type: string

jobs:
  checkpoint:
    runs-on: ubuntu-latest
    env:
      NEON_DATABASE_URL: ${{ secrets.NEON_DATABASE_URL }}
      QUERIA_S3_ENDPOINT: https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com
      QUERIA_S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      QUERIA_S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      QUERIA_S3_BUCKET: ${{ inputs.s3_bucket }}
      CF_ACCOUNT_ID: ${{ secrets.CF_ACCOUNT_ID }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.13
      - run: uv sync

      - name: Expire old snapshots and delete orphaned parquet files
        run: uv run python shared/scripts/checkpoint.py default

      - name: Snapshot Neon DuckLake catalog to R2
        run: uv run python shared/scripts/snapshot-to-r2.py default
