name: Checkpoint (reusable)

on:
  workflow_call:
    inputs:
      s3_bucket:
        required: true
        type: string

jobs:
  checkpoint:
    runs-on: ubuntu-latest
    env:
      FDL_S3_ENDPOINT: https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com
      FDL_S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      FDL_S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      FDL_S3_BUCKET: ${{ inputs.s3_bucket }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.13
      - run: uv lock --upgrade-package frozen-ducklake && uv sync

      - name: Pull DuckLake catalog
        run: uv run fdl pull default

      - name: Expire old snapshots and delete orphaned parquet files
        # ducklake_set_option(..., 'expire_older_than', ...) はオプション値を
        # 記録するだけで実際の expire 処理は走らないため、明示的に
        # ducklake_expire_snapshots / ducklake_delete_orphaned_files を
        # 呼ぶ必要がある (DuckLake v1.0)。
        run: |
          uv run fdl sql default "CALL ducklake_expire_snapshots(current_database(), older_than => NOW() - INTERVAL '7 days')"
          uv run fdl sql default "CALL ducklake_delete_orphaned_files(current_database(), older_than => NOW() - INTERVAL '7 days')"
          uv run fdl sql default "CHECKPOINT"

      - name: Push DuckLake catalog
        run: uv run fdl push default
