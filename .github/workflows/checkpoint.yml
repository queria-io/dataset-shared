name: Checkpoint (reusable)

on:
  workflow_call:
    inputs:
      s3_bucket:
        required: true
        type: string

jobs:
  checkpoint:
    runs-on: ubuntu-latest
    env:
      FDL_S3_ENDPOINT: https://${{ secrets.CF_ACCOUNT_ID }}.r2.cloudflarestorage.com
      FDL_S3_ACCESS_KEY_ID: ${{ secrets.S3_ACCESS_KEY_ID }}
      FDL_S3_SECRET_ACCESS_KEY: ${{ secrets.S3_SECRET_ACCESS_KEY }}
      FDL_S3_BUCKET: ${{ inputs.s3_bucket }}
    steps:
      - uses: actions/checkout@v5
        with:
          submodules: true

      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
      - run: uv python install 3.13
      - run: uv lock --upgrade-package frozen-ducklake && uv sync

      - name: Pull DuckLake catalog
        run: uv run fdl pull default

      - name: Expire old snapshots and delete unreferenced data files
        # fdl expire は snapshot の expire と不要データファイルの cleanup を
        # まとめて実行する。手動の CHECKPOINT は inlined data を parquet に
        # flush してメモリを食い尽くし、肥大カタログで OOM クラッシュする
        # (dataset-e-stat で発生) ため使わない。
        run: uv run fdl expire default --retention-days 7

      - name: Push DuckLake catalog
        run: uv run fdl push default
